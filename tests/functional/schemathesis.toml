# Schemathesis configuration — property-based contract testing.
# Drives §3.4 functional test cases ФТ-07/08/10/12 (invalid inputs,
# missing fields, missing adapters) automatically from the OpenAPI schema
# generated by FastAPI.
#
# Run:
#   schemathesis run http://localhost:8000/openapi.json --config-file schemathesis.toml

base-url = "http://localhost:8000"

[generation]
# 200 examples per operation gives stable coverage without burning the GPU.
# Bump to 500 for the final pre-defence run.
max-examples = 200

[output.sanitization]
# Show full payloads in the report — they end up in the thesis appendix.
enabled = false

[reports.junit]
# Standard JUnit XML so the report can be cited in §3.4 by tooling.
enabled = true
path = "reports/schemathesis-junit.xml"

[reports.har]
# HAR file with every request/response pair — useful as evidence of coverage.
enabled = true
path = "reports/schemathesis.har"

[checks]
# All built-in checks: status codes, schema conformance, header conformance,
# server errors, content-type, and response time.
included = ["all"]

# We want the run to surface every issue per operation, not stop at the first.
[execution]
continue-on-failure = true
